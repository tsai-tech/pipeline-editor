<main
  class="min-h-screen"
  style="
    background: radial-gradient(
      100% 55% at 50% 0%,
      rgba(124, 92, 255, 0.06),
      transparent 60%
    );
  "
>
  <div class="mx-auto flex max-w-6xl flex-col gap-6 px-4 py-8 sm:px-6">
    <tsai-navbar>
      <div brand class="flex items-center gap-2">
        <span class="text-sm font-semibold text-text">Pipeline Editor</span>
        <tsai-button
          variant="ghost"
          size="sm"
          [tsaiMenuTriggerFor]="pgMenu"
          aria-label="Switch playground"
        >
          {{ currentLabel() }}
          <svg
            icon-right
            class="size-4 text-text-3"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="m6 9 6 6 6-6" />
          </svg>
        </tsai-button>
      </div>
      <tsai-button
        actions
        variant="secondary"
        size="sm"
        (click)="toggleTheme()"
      >
        {{ isLight() ? '🌙 Dark' : '☀️ Light' }}
      </tsai-button>
    </tsai-navbar>

    <router-outlet />
  </div>
</main>

<ng-template #pgMenu>
  <tsai-menu>
    @for (p of playgrounds; track p.path) {
    <tsai-menu-item [routerLink]="p.path">{{ p.label }}</tsai-menu-item>
    }
  </tsai-menu>
</ng-template>
