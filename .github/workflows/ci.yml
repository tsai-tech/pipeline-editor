name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_NO_CLOUD: 'true'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps

      - run: npx nx format:check
      # `test` runs the Angular-library specs (@nx/angular:unit-test); `vite:test`
      # the framework-free libs (@nx/vite). Both are needed to cover all units.
      - run: npx nx run-many -t lint typecheck test vite:test build e2e

  # NOTE: Nx Cloud is disabled in CI because the current Nx Cloud organization
  # is disabled/free-plan-exceeded. Remove NX_NO_CLOUD only after Cloud is
  # re-enabled and the access token is valid again.
